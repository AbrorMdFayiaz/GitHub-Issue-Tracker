<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <!-- fav-icon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- css file -->
    <link rel="stylesheet" href="./style/style.css">
    <!-- daisyUI and Tailwind CSS integration -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome CSS integration -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font application -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body class="bg-base-300 pb-16">
    <header class="bg-base-100">
        <nav class=" ">
            <div class="navbar space-y-3.5 bg-base-100 shadow-sm flex flex-col md:flex-row">
  <div class="navbar-start text-center w-full ">
    
    <span class="btn w-full btn-ghost text-2xl  lg:text-xl lg:px-20"><i class="fa-brands fa-github"></i>GitHub Issues Tracker</span>
  </div>
  <div class="navbar-end space-x-1.5 w-full flex justify-between lg:space-x-4 lg:px-20">
    <!-- search box -->
     <label class="input">
  <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
    <g
      stroke-linejoin="round"
      stroke-linecap="round"
      stroke-width="2.5"
      fill="none"
      stroke="currentColor"
    >
      <circle cx="11" cy="11" r="8"></circle>
      <path d="m21 21-4.3-4.3"></path>
    </g>
  </svg>
  <input id="searchInput" type="search"  onkeydown="allOpenClosedButtonClickingAction(event,`all`)"  required placeholder="Search issues..." />
</label>
    <a class="btn btn-primary "><i class="fa-solid fa-plus" ></i>New Issue</a>
  </div>
</div>
        </nav>
    </header>
    <section id="all-open-closed" class="space-x-2 bg-base-100 w-95/100 md:w-5/6 lg:w-7/10 mx-auto mt-16 mb-4  p-6 rounded-lg">
        <button id="all" onclick="allOpenClosedButtonClickingAction(event,`all`)" class="btn btn-outline btn-primary text-[#64748B]  border-[3px] border-base-300 hover:border-primary hover:text-base-100">All</button>
        <button id="open" onclick="allOpenClosedButtonClickingAction(event,`open`)" class="btn btn-outline btn-primary text-[#64748B] border-base-300 border-[3px] hover:border-primary hover:text-base-100">Open</button>
        <button id="closed" onclick="allOpenClosedButtonClickingAction(event,`closed`)" class="btn btn-outline btn-primary text-[#64748B] border-base-300 border-[3px] hover:border-primary hover:text-base-100">Closed</button>
    </section>
    <!-- it's for spinner -->
    <div id="spinner" class="hidden justify-center">
        <span class="loading loading-spinner text-primary w-20 "></span>
    </div>
    <main id="main" class="bg-base-100 w-95/100 md:w-5/6 lg:w-7/10 mx-auto  mb-16 rounded-t-lg">
        <div id="50-issues" class="flex flex-col md:flex-row mr-auto gap-3 md:justify-between md:items-center p-1.5  md:text-start">
            <section class="flex space-x-2  gap-3">
                <article class="inline-block bg-[#ECE4FF] rounded-full p-2 m-1.5  md:p-3"><i class="fa-solid fa-dharmachakra text-primary text-3xl w-2/3 md:w-full "></i></article>
                <div class="space-y-1 ">
                    <h3 class="font-semibold text-2xl"><span id="issue-number"></span> Issues</h3>
                    <p class="text-[14px] md:text-base font-normal text-[#64748B]">Track and manage your project issues</p>
                </div>
            </section>
            <section class="space-x-2 p-1.5">
                <span><i class="fa-solid fa-circle text-success"></i>Open</span>
                <span><i class="fa-solid fa-circle text-[#A855F7]"></i>Closed</span>
            </section>
        </div>
        <div id="card-container" class="bg-base-200 p-6 grid sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3">
        <!-- issue cards will be added here dynamically by js-->
        </div>
        <div id="modal-container">
        <!-- modals will be added here dynamically by js-->
        </div>
    </main>
    <footer></footer>
    <script src="./script/spinner.js"></script>
    <script src="./script/all_Open_Closed_buttonClickingACtion.js"></script>
    <script src="./script/showCards.js"></script>
    <script src="./script/activeButtonShower.js"></script>
    <script src="./script/issueNumberShower.js"></script>
    <script src="./script/modalShowerForDatailedInfo.js"></script>
    <script src="./script/searchFunctionality.js"></script>
</body>
</html>

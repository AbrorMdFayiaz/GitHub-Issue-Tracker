<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="./style/style.css">
    <!-- fav-icon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- daisyUI and Tailwind CSS integration -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome CSS integration -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font application -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body class="space-y-6">
    <section class=" w-1/3 mx-auto text-center m-20">
            <img src="./assets/github-logo.png" class="mx-auto" alt="">
            <h1 class="mt-6 mb-1 font-semibold text-2xl">GitHub Issues Tracker</h1>
            <p class="font-normal text-base text-[#64748B]">Sign in to manage your issues</p>
    </section>
    <section class="w-1/3 mx-auto">
        <fieldset class="fieldset border-none rounded-box w-xs border p-4 mx-auto">

           <label class="label text-base font-medium text-[#1F2937]">Username</label>
           <input id="username"  type="text" class="input text-[#64748B] font-normal leading-4" placeholder="Enter Username" />
       
           <label class="label  text-base font-medium text-[#1F2937]">Password</label>
           <input id="password" type="password" class="input text-[#64748B] font-normal leading-4" placeholder="Enter Password" />
       
           <button id="login-button" class="btn btn-primary mt-4">Sign in</button>
        </fieldset>
    </section>
    <script src="./script/login.js"></script>







<!-- Open the modal using ID.showModal() method -->
<button class="btn" onclick="my_modal_5.showModal()">open modal</button>
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
   <div class="modal-box">
      <article>
    <h1 class="font-bold text-2xl mb-2 ">Fix broken image uploads</h1>
    <div class="flex items-center my-auto">
        <h2 class=" bg-[#00A96E] rounded-full inline-block p-2 text-[#FFFFFF] text-[12px]  font-medium">Opened</h2>&nbsp;
        <i class="fa-solid fa-circle text-[4px] text-[#64748B]"></i>&nbsp;
        <span class="text-[#64748B] text-[12px]">Opened by Fahim Ahmed</span>&nbsp;
        <i class="fa-solid fa-circle text-[4px] text-[#64748B]"></i>&nbsp;
        <span class="text-[#64748B] text-[12px]">22/02/2026</span>
    </div>
    <section class="p-5 space-y-5">
        <section>
            <div class="bg-secondary-content text-[#EF4444] text-[12px] border-2 border-[#FECACA] inline-block py-1.5 px-7  rounded-[6.25rem] "><i class="fa-solid fa-bug"></i> BUG</div>
        <div class="bg-secondary-content text-[#EF4444] text-[12px] border-2 border-[#FECACA] inline-block py-1.5 px-7  rounded-[6.25rem] "><i class="fa-solid fa-bug"></i> BUG</div>
        </section>
    <section>
        <p class="text-[#64748B] text-base font-normal">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
    </section>
    <section class="grid grid-cols-2 bg-base-300 rounded-lg p-4">
        <div class="space-y-2">
            <p class="text-base font-normal text-[#64748B]  ">Assignee:</p>
            <h3 class="font-semibold text-base">Fahim Ahmed</h3>
        </div>
        <div class="space-y-1.5">
            <p class="text-base font-normal text-[#64748B] ">Priority:</p>
            <h4 class=" inline-block text-[#FFFFFF] text-[12px] font-medium bg-[#EF4444] px-4 py-1.5 rounded-[100px] ">HIGH</h4>
        </div>
    </section>
</article>
      <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn btn-primary">Close</button>
          </form>
      </div>
   </div>
</dialog>





</body>
</html>

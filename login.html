<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="./style/style.css">
    <!-- fav-icon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- daisyUI and Tailwind CSS integration -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome CSS integration -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font application -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Geist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body class="space-y-6 mx-auto  w-full pt-5 ">
<main class=" w-full mx-auto">
        <section class=" mx-auto text-center  lg:w-1/3 mb-7 ">
            <img src="./assets/github-logo.png" class="mx-auto" alt="">
            <h1 class="mt-6 mb-1 font-semibold text-2xl">GitHub Issues Tracker</h1>
            <p class="font-normal text-base text-[#64748B]">Sign in to manage your issues</p>
    </section>
    <section class="lg:w-1/3 mx-auto">
        <fieldset class="fieldset border-none rounded-box w-xs border p-4 mx-auto">

           <label class="label text-base font-medium text-[#1F2937]">Username</label>
           <input id="username"  type="text" class="input text-[#64748B] font-normal leading-4" placeholder="Enter Username" />
       
           <label class="label  text-base font-medium text-[#1F2937]">Password</label>
           <input id="password" type="password" class="input text-[#64748B] font-normal leading-4" placeholder="Enter Password" />
       
           <button id="login-button" class="btn btn-primary mt-4">Sign in</button>
        </fieldset>
    </section>
    <script src="./script/login.js"></script>
</main>
</body>
</html>
